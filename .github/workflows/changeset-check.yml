name: Changeset Check

on:
  pull_request:
    branches: [development]

jobs:
  changeset:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-changeset') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for a changeset entry
        run: |
          if ! git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- .changeset \
              | grep -qvE '(^\.changeset/config\.json$|^\.changeset/README\.md$)'; then
            echo "No changeset entry found for this PR."
            echo "Run 'npm run changeset' to add one, or label this PR 'skip-changeset' to bypass."
            exit 1
          fi
