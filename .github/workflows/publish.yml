name: Publish release artifact

# Builds the production bundle on a version tag and attaches it to the GitHub
# Release. Runs only on a version tag (never on a plain push to main), so a
# release publishes exactly once. "!v*-*" excludes prerelease tags.
on:
  push:
    tags: [ "v*", "!v*-*" ]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (production)
        run: npm run build

      - name: Package tarball
        id: pkg
        run: |
          version="${GITHUB_REF_NAME#v}"
          asset="ekklesia-frontend-${version}.tgz"
          tar -czf "$asset" -C build/production .
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_MANAGER_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_MANAGER_APP_PRIVATE_KEY }}

      - name: Create GitHub Release with the production tarball
        # Attributed to the Release Manager App. Notes are the CHANGELOG section
        # for this version.
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes=$(awk -v v="## ${version}" '$0==v{f=1;next} /^## /{if(f)exit} f' CHANGELOG.md)
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "${notes:-Release ${GITHUB_REF_NAME}}" \
            "${{ steps.pkg.outputs.asset }}"
