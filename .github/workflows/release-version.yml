name: Release Version

on:
  push:
    branches: [staging]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mint an Ekklesia Release Bot token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Version Packages PR / tag on merge
        uses: changesets/action@v1
        with:
          # No npm publish — this repo isn't published to a registry.
          # `changeset git-tag` just creates the version tag + GitHub
          # Release; release-publish.yml does the actual build+upload
          # once that tag lands.
          publish-script: npx changeset git-tag
          create-github-releases: true
          commit-message: "Version Packages"
          pr-title: "Version Packages"
          pr-base-branch: staging
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
