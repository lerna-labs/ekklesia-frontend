name: Release Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Pick the build for this tag
        id: mode
        run: |
          if [[ "${{ github.ref_name }}" == *-rc.* ]]; then
            echo "script=build:preprod" >> "$GITHUB_OUTPUT"
            echo "dir=preprod" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "script=build" >> "$GITHUB_OUTPUT"
            echo "dir=production" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - run: npm run ${{ steps.mode.outputs.script }}

      - name: Tarball the build output
        run: |
          tar -czf "ekklesia-frontend-${{ github.ref_name }}.tar.gz" \
            -C build "${{ steps.mode.outputs.dir }}"

      - name: Attach artifact to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "ekklesia-frontend-${{ github.ref_name }}.tar.gz" \
            --clobber
          if [ "${{ steps.mode.outputs.prerelease }}" = "true" ]; then
            gh release edit "${{ github.ref_name }}" --prerelease
          fi
