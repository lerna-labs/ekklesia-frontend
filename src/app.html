<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<link rel="apple-touch-icon"
		  sizes="180x180"
		  href="/apple-touch-icon.png">
	<link rel="icon"
		  type="image/png"
		  sizes="32x32"
		  href="/favicon-32x32.png">
	<link rel="icon"
		  type="image/png"
		  sizes="16x16"
		  href="/favicon-16x16.png">
	<link rel="manifest"
		  href="/site.webmanifest">
	<meta name="viewport"
		  content="width=device-width, initial-scale=1" />

	<!-- HTML Meta Tags -->
	<title>Ekklesia x Intersect</title>
	<meta name="description"
		  content="Verifiable on-chain voting on Cardano.">

	<!-- Facebook Meta Tags -->
	<meta property="og:url"
		  content="intersect.ekklesia.vote">
	<meta property="og:type"
		  content="website">
	<meta property="og:title"
		  content="Ekklesia">
	<meta property="og:description"
		  content="Verifiable on-chain voting on Cardano.">
	<meta property="og:image"
		  content="https://intersect.ekklesia.vote/social.png">

	<!-- Twitter Meta Tags -->
	<meta name="twitter:card"
		  content="summary_large_image">
	<meta property="twitter:domain"
		  content="intersect.ekklesia.vote">
	<meta property="twitter:url"
		  content="intersect.ekklesia.vote">
	<meta name="twitter:title"
		  content="Ekklesia x Intersect">
	<meta name="twitter:description"
		  content="Verifiable on-chain voting on Cardano.">
	<meta name="twitter:image"
		  content="https://intersect.ekklesia.vote/social.png">


	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
	<noscript>
		<div>
			<p>This app requires JavaScript to be enabled in your browser.</p>
			<p>To enable JavaScript, please refer to the documentation for your specific browser.</p>
			<p>Once JavaScript is enabled, please refresh the page.</p>
			<p>If you are using a browser that does not support JavaScript, please consider switching to a modern
				browser.</p>
		</div>
	</noscript>
</body>

</html>
